<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>t h e s t a t e o f t h e t e x t</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #fff;
  font-family: Georgia, "Times New Roman", serif;
}

#container {
  width: 700px;
  height: 700px;
  border: 1px solid #000;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  touch-action: none;
}

.word {
  position: absolute;
  font-size: 16px;
  white-space: nowrap;
  user-select: none;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: opacity 0.05s linear;
}

.cover {
  position: absolute;
  transform: translate(-50%, -50%);
  pointer-events: none;
  height: 20px;
}
</style>
</head>
<body>
<div id="container"></div>

<script>
const containerWidth = 700;
const containerHeight = 700;
const cols = 6;
const rows = 3;

const pos = (col,row) => ({
  x: (containerWidth/cols)*col + (containerWidth/(2*cols)),
  y: (containerHeight/rows)*row + (containerHeight/(2*rows))
});

const words = [
  "capitalism","archives","gestures","until","labour","evaporates",
  "bodies","perform","resistance","inside","regulated","attention",
  "museum","simulates","conflict","while","value","circulates"
];

const coveredIndices = [1,2,3,4,8,9,10,11,13,15,16,17];

const stateA = [...words];
const stateB1 = [...words];
const stateB2 = [
  "capitalism","simulates","resistance","while","attention","evaporates",
  "bodies","perform","gestures","until","labour","circulates",
  "museum","archives","conflict","inside","regulated","value"
];

const container = document.getElementById("container");
const nodes = [];
const covers = [];
let animateNoiseActive = true;

// ===================== NOISE =====================
function createNoiseCanvas(){
  const c = document.createElement("canvas");
  c.width = 70 + Math.random()*40;
  c.height = 20 + Math.random()*30;
  c.ctx = c.getContext("2d");
  c.img = c.ctx.createImageData(c.width, c.height);
  return c;
}

function drawNoise(c){
  const data = c.img.data;
  for(let i=0;i<data.length;i+=8){
    const v = Math.random()*255;
    data[i]=v;
    data[i+1]=v;
    data[i+2]=v;
    data[i+3]=255;
  }
  c.ctx.putImageData(c.img,0,0);
}

// ===================== CREAZIONE =====================
words.forEach((w,i)=>{
  const row = Math.floor(i/cols);
  const col = i%cols;

  const span = document.createElement("span");
  span.className="word";
  span.textContent=w;

  const p = pos(col,row);
  span.style.left = p.x+"px";
  span.style.top = p.y+"px";

  container.appendChild(span);

  let cover = null;
  if(coveredIndices.includes(i)){
    cover = createNoiseCanvas();
    cover.className="cover";
    cover.style.left = p.x + "px";
    cover.style.top = p.y + "px";
    container.appendChild(cover);
    span.style.opacity = 0;
    drawNoise(cover);
  }

  nodes.push({el: span, index:i, x:p.x, y:p.y});
  covers.push(cover);
});

// ===================== ANIMAZIONE =====================
let frame = 0;
function animateNoise(){
  frame++;
  if(frame % 2 === 0 && animateNoiseActive){
    for(let i=0;i<covers.length;i++){
      const c = covers[i];
      if(c && c.style.opacity !== "0"){
        drawNoise(c);
      }
    }
  }
  requestAnimationFrame(animateNoise);
}

// ===================== STATE SWITCH =====================
let nextB = 1;
function showState(state){
  const isA = (state === stateA);
  animateNoiseActive = isA;

  nodes.forEach(n=>{
    const w = n.index;
    const span = n.el;
    let cover = covers[w];

    if(isA && coveredIndices.includes(w)){
      if(!cover){
        cover = createNoiseCanvas();
        cover.className="cover";
        cover.style.left = n.x + "px";
        cover.style.top = n.y + "px";
        container.appendChild(cover);
        covers[w] = cover;
      }
      cover.style.opacity = 1;
      span.style.opacity = 0;
      drawNoise(cover);

    } else if(coveredIndices.includes(w)){
      span.style.opacity = 1;
      if(cover) cover.style.opacity = 0;
    } else {
      span.style.opacity = 1;
    }

    span.textContent = state[w];
  });
}

// ===================== DEVICE DETECTION =====================
const isTouchDevice = window.matchMedia("(pointer: coarse)").matches;

// ===================== INTERAZIONI =====================
if(!isTouchDevice){

  // ===== DESKTOP =====
  container.addEventListener("pointerenter", ()=>{
    if(nextB===1){
      showState(stateB1);
      nextB=2;
    } else {
      showState(stateB2);
      nextB=1;
    }
  });

  container.addEventListener("pointerleave", ()=>{
    showState(stateA);
  });

} else {

  // ===== TABLET / TOUCH =====
  let isTouching = false;

  container.addEventListener("touchstart", e=>{
    e.preventDefault();

    if(!isTouching){
      isTouching = true;

      if(nextB===1){
        showState(stateB1);
        nextB=2;
      } else {
        showState(stateB2);
        nextB=1;
      }
    }

  }, {passive:false});

  container.addEventListener("touchend", e=>{
    e.preventDefault();
    isTouching = false;
    showState(stateA);
  }, {passive:false});

  container.addEventListener("touchcancel", ()=>{
    isTouching = false;
    showState(stateA);
  });

}

// ===================== INIT =====================
showState(stateA);
animateNoise();
</script>
</body>
</html>
